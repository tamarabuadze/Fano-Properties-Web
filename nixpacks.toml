[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@11.3.0 --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @fano/db db:generate",
  "pnpm --filter @fano/web build"
]

[start]
cmd = "pnpm --filter @fano/web start"
